<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Love Maths">
    <meta name="keywords" content="maths arithmetic drill test game">
    <title>Love Maths</title>
    <!-- favicon -->
    <link rel='shortcut icon' type='image/x-icon' href='assets/favicon/favicon.ico'>
    <link rel="preconnect" href="https://fonts.bunny.net">
    <link href="https://fonts.bunny.net/css?family=raleway:400,700" rel="stylesheet">
    <!-- Font-Awesome stylesheet -->
    <link rel="stylesheet" href="vendor/font-awesome/css/all.min.css">
    <!-- Project stylesheet comes last -->
    <link rel="stylesheet" href="assets/css/style.css">
</head>

<body>
    <main>
        <h1 class="heading">
            <img src="assets/images/logo.png" alt="Love Maths Logo" class="logo"> Love Maths
        </h1>

        <section class="game-area">
            <div class="controls-area">
                <button data-type="add" class="btn btn-big btn-green">
                    <i class="fas fa-plus"></i>
                </button>
                <button data-type="subtract" class="btn btn-big btn-blue">
                    <i class="fas fa-minus"></i>
                </button>
                <button data-type="multiply" class="btn btn-big btn-orange">
                    <i class="fas fa-times"></i>
                </button>
                <button data-type="divide" class="btn btn-big btn-red">
                    <i class="fas fa-divide"></i>
                </button>
            </div>
            <div class="question-area">
                <span id="operand1">0</span>
                <span id="operator">+</span>
                <span id="operand2">0</span>
                <span>=</span>
                <p class="answer-message">Enter Answer:</p>
                <input id="answer-box" type="number">
                <span id="wrong" class="hidden">&#x2717;</span>
            </div>
            <button data-type="submit" id="submit" class="btn btn-grey">Submit Answer</button>
        </section>

        <section class="score-area">
            <p class="scores">Correct Answers <span class="glow glow-green"></span><span id="correct">0</span></p>
            <p class="scores">Incorrect Answers <span class="glow glow-red"></span><span id="incorrect">0</span></p>
        </section>
    </main>

    <!-- Load the project javascript -->
    <script src="assets/js/script.js"></script>
</body>

</html>
